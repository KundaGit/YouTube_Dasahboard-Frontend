<div class="videos">
  <div class="page-header">
    <!-- SEARCH -->

<div class="top-controls">

  <input
    type="text"
    placeholder="Search videos..."
    [(ngModel)]="searchTerm"
    class="search-input">

  <!-- TABS -->

  <div class="tabs">

    <button
      class="tab-btn"
      [class.active]="activeTab === 'all'"
      (click)="activeTab = 'all'">

      All

    </button>

    <button
      class="tab-btn"
      [class.active]="activeTab === 'shorts'"
      (click)="activeTab = 'shorts'">

      Shorts

    </button>

    <button
      class="tab-btn"
      [class.active]="activeTab === 'long'"
      (click)="activeTab = 'long'">

      Long Videos

    </button>

  </div>

</div>
    <h1>🎬 Videos</h1>
    <span class="count" *ngIf="videos.length">{{ videos.length }} videos</span>
  </div>

  <div *ngIf="loading" class="loader">
    <div class="spinner"></div><p>Loading videos...</p>
  </div>

  <div *ngIf="error" class="error-box">⚠️ {{ error }}</div>

  <div *ngIf="!loading" class="video-grid">
    <div *ngFor="let v of filteredVideos" class="video-card">
      <div class="thumbnail-wrap">
        <img [src]="v.thumbnail" [alt]="v.title" class="thumbnail" loading="lazy" />
        <!-- <a [href]="v.videoUrl" target="_blank" class="play-btn">▶</a> -->
         <button class="play-btn"
        (click)="openVideo(v.videoId)">
  ▶
</button>
      </div>
      <div class="card-body">
        <p class="video-title">{{ v.title }}</p>
        <p class="video-date">📅 {{ formatDate(v.publishedAt) }}</p>
        <button class="edit-btn" (click)="openEdit(v)">✏️ Edit</button>
      </div>
    </div>
  </div>
<div class="load-more-wrap"
     *ngIf="nextPageToken && !loading">

  <button
    class="load-more-btn"
    (click)="loadVideos()">

    Load More Videos

  </button>

</div>
  <!-- Edit Modal -->
  <div class="modal-overlay" *ngIf="editingVideo" (click)="closeEdit()">
    <div class="modal" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h3>✏️ Edit Video</h3>
        <button class="close-btn" (click)="closeEdit()">✕</button>
      </div>
      <div class="modal-body">
        <label>Title</label>
        <input [(ngModel)]="editTitle" class="input" placeholder="Video title" />

        <label>Description</label>
        <textarea [(ngModel)]="editDescription" class="textarea" rows="5" placeholder="Video description"></textarea>

        <div *ngIf="saveMsg" class="save-msg">{{ saveMsg }}</div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" (click)="closeEdit()">Cancel</button>
        <button class="btn-save" (click)="saveEdit()" [disabled]="saving">
          {{ saving ? 'Saving...' : 'Save Changes' }}
        </button>
      </div>
    </div>
  </div>
<!-- VIDEO PLAYER MODAL -->

<div class="video-modal"
     *ngIf="selectedVideoId">

  <div class="video-overlay"
       (click)="closeVideo()">
  </div>

  <div class="video-container">

    <button class="close-video"
            (click)="closeVideo()">
      ✕
    </button>

   <iframe
  [src]="safeVideoUrl"
  frameborder="0"
  allow="autoplay; encrypted-media"
  allowfullscreen>
</iframe>

  </div>

</div>
</div>
